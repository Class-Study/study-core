services:

  # ══════════════════════════════════════════════
  # POSTGRESQL 16
  # ══════════════════════════════════════════════
  postgres:
    image: postgres:16-alpine
    container_name: study_postgres
    environment:
      POSTGRES_DB: study
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study123
    ports:
      - "5432:5432"
    volumes:
      - study_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study -d study"]
      interval: 10s
      timeout: 5s
      retries: 5


  # ══════════════════════════════════════════════
  # RABBITMQ 3.13
  # ══════════════════════════════════════════════
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: study_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI: http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  study_postgres:
  rabbitmq_data:
