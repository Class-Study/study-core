# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — Stack do Backend  (coloque este arquivo no repo do backend)
#
# Serviços:
#   postgres  — banco de dados
#   rabbitmq  — message broker
#   backend   — Spring Boot API
#
# NÃO inclui nginx nem frontend — gerenciados pelo pipeline do frontend.
#
# Uso:
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       ${DB_NAME:-eduspace}
      POSTGRES_USER:     ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-eduspace}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── RabbitMQ ─────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  # ── Backend (Spring Boot) ────────────────────────────────────────────────────
  backend:
    image: ghcr.io/${GHCR_OWNER:-class-study}/study-back:${BACK_VERSION:-latest}
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/${DB_NAME:-eduspace}
      SPRING_DATASOURCE_USERNAME: ${DB_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_RABBITMQ_HOST:       rabbitmq
      SPRING_RABBITMQ_PORT:       5672
      SPRING_RABBITMQ_USERNAME:   ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD:   ${RABBITMQ_PASSWORD:-guest}
      JWT_SECRET:                 ${JWT_SECRET:?JWT_SECRET is required}
      JAVA_OPTS:                  "-Xms256m -Xmx512m"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

# ── Named volumes ──────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  rabbitmq_data: