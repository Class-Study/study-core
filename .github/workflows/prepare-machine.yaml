# ─────────────────────────────────────────────────────────────────────────────
# Workflow reutilizável — Preparação da máquina EC2
#
# Responsabilidades
# ─────────────────
#  • Instala Docker (engine + CLI) e Docker Compose plugin
#  • Instala utilitários essenciais (wget, curl, jq…)
#  • Cria diretório de deploy e ajusta permissões
#  • Escreve o .env com credenciais de infra
#  • Sobe PostgreSQL e RabbitMQ e aguarda healthcheck
#
# Como usar em outro workflow
# ───────────────────────────
#   jobs:
#     prepare:
#       uses: ./.github/workflows/prepare-machine.yaml
#       secrets: inherit
#
# Secrets obrigatórios
# ────────────────────
#   EC2_HOST          — IP / hostname da instância
#   EC2_USER          — usuário SSH  (ex: ubuntu)
#   EC2_SSH_KEY       — chave PEM completa
#   EC2_DEPLOY_PATH   — caminho absoluto na EC2  (ex: /opt/eduspace)
#   DB_NAME           — nome do banco PostgreSQL
#   DB_USER           — usuário do banco
#   DB_PASSWORD       — senha do banco
#   RABBITMQ_USER     — usuário RabbitMQ
#   RABBITMQ_PASSWORD — senha RabbitMQ
# ─────────────────────────────────────────────────────────────────────────────

name: Prepare Machine — EC2

on:
  # ── Pode ser chamado por outros workflows ───────────────────────────────────
  workflow_call:
    secrets:
      EC2_HOST:
        required: true
      EC2_USER:
        required: true
      EC2_SSH_KEY:
        required: true
      EC2_DEPLOY_PATH:
        required: true
      DB_NAME:
        required: true
      DB_USER:
        required: true
      DB_PASSWORD:
        required: true
      RABBITMQ_USER:
        required: true
      RABBITMQ_PASSWORD:
        required: true

  # ── Pode ser executado manualmente (útil para provisionar uma EC2 nova) ─────
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo da execução manual"
        required: false
        default: "Provisionar / atualizar dependências da EC2"

jobs:
  prepare:
    name: Prepare — instala dependências e sobe infra na EC2
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── Envia o docker-compose.yaml para a EC2 ─────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copiar docker-compose.yaml para EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          source:   "docker-compose.yaml"
          target:   ${{ secrets.EC2_DEPLOY_PATH }}

      # ── Instala dependências, escreve .env e sobe postgres + rabbitmq ───────
      - name: Preparar máquina via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH:       ${{ secrets.EC2_DEPLOY_PATH }}
          DB_NAME:           ${{ secrets.DB_NAME }}
          DB_USER:           ${{ secrets.DB_USER }}
          DB_PASSWORD:       ${{ secrets.DB_PASSWORD }}
          RABBITMQ_USER:     ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          timeout:  300s
          envs:     DEPLOY_PATH,DB_NAME,DB_USER,DB_PASSWORD,RABBITMQ_USER,RABBITMQ_PASSWORD
          script: |
            set -euo pipefail

            echo "════════════════════════════════════════"
            echo " EduSpace — Preparação da máquina EC2"
            echo "════════════════════════════════════════"

            SKIP_DOCKER=false
            SKIP_COMPOSE=false
            SKIP_POSTGRES=false
            SKIP_RABBITMQ=false

            # ── Pré-verificação: checa o que já está pronto ───────────────────
            echo "🔍 Verificando o que já está instalado/rodando..."

            command -v docker &>/dev/null                          && SKIP_DOCKER=true
            sudo docker compose version &>/dev/null               && SKIP_COMPOSE=true

            if [ "$SKIP_DOCKER" = "true" ] && [ "$SKIP_COMPOSE" = "true" ]; then
              cd "$DEPLOY_PATH" 2>/dev/null || true
              PG_STATUS=$(sudo docker compose ps --format json postgres 2>/dev/null \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health',''))" 2>/dev/null || echo "")
              MQ_STATUS=$(sudo docker compose ps --format json rabbitmq 2>/dev/null \
                | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health',''))" 2>/dev/null || echo "")
              [ "$PG_STATUS" = "healthy" ] && SKIP_POSTGRES=true
              [ "$MQ_STATUS" = "healthy" ] && SKIP_RABBITMQ=true
            fi

            echo "  Docker          : $([ "$SKIP_DOCKER"   = "true" ] && echo "✅ já instalado"  || echo "⚙️  será instalado")"
            echo "  Docker Compose  : $([ "$SKIP_COMPOSE"  = "true" ] && echo "✅ já instalado"  || echo "⚙️  será instalado")"
            echo "  PostgreSQL      : $([ "$SKIP_POSTGRES" = "true" ] && echo "✅ já healthy"    || echo "⚙️  será iniciado")"
            echo "  RabbitMQ        : $([ "$SKIP_RABBITMQ" = "true" ] && echo "✅ já healthy"    || echo "⚙️  será iniciado")"
            echo ""

            # ── Atalho: tudo pronto, nada a fazer ────────────────────────────
            if [ "$SKIP_DOCKER" = "true" ] && [ "$SKIP_COMPOSE" = "true" ] && \
               [ "$SKIP_POSTGRES" = "true" ] && [ "$SKIP_RABBITMQ" = "true" ]; then
              echo "🚀 Máquina já está 100% preparada — nenhuma ação necessária."
              sudo docker compose ps postgres rabbitmq
              exit 0
            fi

            # ── 1. Atualiza pacotes base (apenas se algo precisa ser instalado) ──
            if [ "$SKIP_DOCKER" = "false" ] || [ "$SKIP_COMPOSE" = "false" ]; then
              echo "📦 Atualizando lista de pacotes..."
              sudo apt-get update -y -q

              echo "🔧 Instalando utilitários (wget, curl, gnupg, unzip, jq)..."
              sudo apt-get install -y -q \
                wget curl gnupg lsb-release ca-certificates \
                unzip jq net-tools
            fi

            # ── 2. Instala Docker Engine ──────────────────────────────────────
            if [ "$SKIP_DOCKER" = "false" ]; then
              echo "🐳 Instalando Docker Engine..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker "$USER"
              echo "✅ Docker instalado: $(sudo docker --version)"
            else
              echo "⏭️  Docker — já instalado, pulando."
            fi

            # ── 3. Instala Docker Compose plugin ─────────────────────────────
            if [ "$SKIP_COMPOSE" = "false" ]; then
              echo "🐳 Instalando Docker Compose plugin..."
              COMPOSE_VER=$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
                | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fsSL \
                "https://github.com/docker/compose/releases/download/v${COMPOSE_VER}/docker-compose-linux-x86_64" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              echo "✅ Docker Compose instalado: $(sudo docker compose version)"
            else
              echo "⏭️  Docker Compose — já instalado, pulando."
            fi

            # ── 4. Garante que o serviço Docker está ativo ────────────────────
            if ! sudo systemctl is-active --quiet docker; then
              echo "🚀 Iniciando serviço Docker..."
              sudo systemctl enable docker
              sudo systemctl start  docker
            fi

            # ── 5. Garante diretório de deploy ────────────────────────────────
            sudo mkdir -p "$DEPLOY_PATH"
            sudo chown -R "$USER":"$USER" "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            # ── 6. Escreve/atualiza o .env de infra ───────────────────────────
            echo "📝 Atualizando .env..."
            BACK_VER=$(grep -Po  '(?<=^BACK_VERSION=).*'  .env 2>/dev/null || echo "latest")
            FRONT_VER=$(grep -Po '(?<=^FRONT_VERSION=).*' .env 2>/dev/null || echo "latest")
            GHCR_OWNER=$(grep -Po '(?<=^GHCR_OWNER=).*'  .env 2>/dev/null || echo "")

            cat > .env <<ENVEOF
            DB_NAME=${DB_NAME}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            RABBITMQ_USER=${RABBITMQ_USER}
            RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
            BACK_VERSION=${BACK_VER}
            FRONT_VERSION=${FRONT_VER}
            GHCR_OWNER=${GHCR_OWNER}
            ENVEOF

            # ── 7. Sobe PostgreSQL (se necessário) ────────────────────────────
            if [ "$SKIP_POSTGRES" = "false" ]; then
              echo "🗄️  Subindo PostgreSQL..."
              sudo docker compose pull postgres
              sudo docker compose up -d --no-deps postgres

              echo "⏳ Aguardando PostgreSQL ficar healthy..."
              for i in $(seq 1 24); do
                STATUS=$(sudo docker compose ps --format json postgres 2>/dev/null \
                  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health',''))" 2>/dev/null || echo "")
                if [ "$STATUS" = "healthy" ]; then
                  echo "✅ PostgreSQL healthy!"
                  break
                fi
                echo "  [$i/24] PostgreSQL status: ${STATUS:-starting}..."
                sleep 5
                if [ "$i" -eq 24 ]; then
                  echo "❌ PostgreSQL não ficou healthy a tempo"
                  sudo docker compose logs postgres --tail=30
                  exit 1
                fi
              done
            else
              echo "⏭️  PostgreSQL — já healthy, pulando."
            fi

            # ── 8. Sobe RabbitMQ (se necessário) ─────────────────────────────
            if [ "$SKIP_RABBITMQ" = "false" ]; then
              echo "🐇 Subindo RabbitMQ..."
              sudo docker compose pull rabbitmq
              sudo docker compose up -d --no-deps rabbitmq

              echo "⏳ Aguardando RabbitMQ ficar healthy..."
              for i in $(seq 1 24); do
                STATUS=$(sudo docker compose ps --format json rabbitmq 2>/dev/null \
                  | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('Health',''))" 2>/dev/null || echo "")
                if [ "$STATUS" = "healthy" ]; then
                  echo "✅ RabbitMQ healthy!"
                  break
                fi
                echo "  [$i/24] RabbitMQ status: ${STATUS:-starting}..."
                sleep 5
                if [ "$i" -eq 24 ]; then
                  echo "❌ RabbitMQ não ficou healthy a tempo"
                  sudo docker compose logs rabbitmq --tail=30
                  exit 1
                fi
              done
            else
              echo "⏭️  RabbitMQ — já healthy, pulando."
            fi

            # ── 9. Resumo final ───────────────────────────────────────────────
            echo ""
            echo "════════════════════════════════════════"
            echo "  Docker         : $(sudo docker --version)"
            echo "  Docker Compose : $(sudo docker compose version)"
            echo "  Diretório      : $DEPLOY_PATH"
            echo "════════════════════════════════════════"
            echo ""
            echo "  Serviços de infra rodando:"
            sudo docker compose ps postgres rabbitmq
            echo ""
            echo "✅ Máquina pronta para deploy do backend!"
