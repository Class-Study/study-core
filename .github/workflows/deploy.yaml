# ─────────────────────────────────────────────────────────────────────────────
# CI/CD — EduSpace Backend  (copie este arquivo para o repositório do backend)
#
# Stages
# ──────
#  ci     — compile + test
#  docker — build & push imagem para GHCR
#  deploy — instala Docker se necessário, escreve .env, sobe infra + backend
#
# Secrets layout
# ──────────────
#  Organization secrets  (org → Settings → Secrets → Actions):
#    EC2_HOST          — IP / hostname da EC2
#    EC2_USER          — usuário SSH (ex: "ubuntu")
#    EC2_SSH_KEY       — conteúdo da chave PEM
#    EC2_DEPLOY_PATH   — caminho na EC2 (opcional, padrão: /opt/eduspace)
#
#  Repository secrets  (repo → Settings → Secrets → Actions):
#    DB_NAME           — nome do banco PostgreSQL
#    DB_USER           — usuário do banco
#    DB_PASSWORD       — senha do banco
#    RABBITMQ_USER     — usuário RabbitMQ
#    RABBITMQ_PASSWORD — senha RabbitMQ
#    JWT_SECRET        — segredo JWT (≥256 bits hex)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD — Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/study-back

jobs:

  # ── 1. Compile & test ────────────────────────────────────────────────────────
  ci:
    name: CI — compile & test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Build & test
        run: ./mvnw -B verify --no-transfer-progress

  # ── 2. Build & push imagem Docker para GHCR ─────────────────────────────────
  docker:
    name: Docker — build & push
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Deploy stack de backend na EC2 ───────────────────────────────────────
  #
  # Este job é dono do .env na EC2 e sobe: postgres · rabbitmq · backend
  # NÃO toca em nginx nem frontend — gerenciados pelo pipeline do frontend.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy — EC2
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    permissions:
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Envia o docker-compose.yml para a EC2 ────────────────────────────────
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          source:   "docker-compose.yml"
          target:   ${{ secrets.EC2_DEPLOY_PATH || '/opt/eduspace' }}

      # ── Instala Docker, escreve .env, sobe infra + backend ───────────────────
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH:       ${{ secrets.EC2_DEPLOY_PATH || '/opt/eduspace' }}
          DB_NAME:           ${{ secrets.DB_NAME }}
          DB_USER:           ${{ secrets.DB_USER }}
          DB_PASSWORD:       ${{ secrets.DB_PASSWORD }}
          RABBITMQ_USER:     ${{ secrets.RABBITMQ_USER }}
          RABBITMQ_PASSWORD: ${{ secrets.RABBITMQ_PASSWORD }}
          JWT_SECRET:        ${{ secrets.JWT_SECRET }}
          REPO_OWNER:        ${{ github.repository_owner }}
          GHCR_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR:        ${{ github.actor }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          timeout:  180s
          envs:     DEPLOY_PATH,DB_NAME,DB_USER,DB_PASSWORD,RABBITMQ_USER,RABBITMQ_PASSWORD,JWT_SECRET,REPO_OWNER,GHCR_TOKEN,GHCR_ACTOR
          script: |
            set -euo pipefail

            # ── 1. Instala Docker se necessário ───────────────────────────────
            if ! command -v docker &>/dev/null; then
              echo "🐳 Instalando Docker..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker "$USER"
              echo "✅ Docker instalado"
            else
              echo "✅ Docker: $(docker --version)"
            fi

            # ── 2. Instala Docker Compose plugin se necessário ────────────────
            if ! sudo docker compose version &>/dev/null; then
              echo "🐳 Instalando Docker Compose..."
              COMPOSE_VERSION=$(curl -fsSL https://api.github.com/repos/docker/compose/releases/latest \
                | grep '"tag_name"' | sed 's/.*"v\([^"]*\)".*/\1/')
              sudo mkdir -p /usr/local/lib/docker/cli-plugins
              sudo curl -fsSL \
                "https://github.com/docker/compose/releases/download/v${COMPOSE_VERSION}/docker-compose-linux-x86_64" \
                -o /usr/local/lib/docker/cli-plugins/docker-compose
              sudo chmod +x /usr/local/lib/docker/cli-plugins/docker-compose
              echo "✅ Docker Compose instalado"
            else
              echo "✅ Docker Compose: $(sudo docker compose version)"
            fi

            # ── 3. Garante diretório de deploy ────────────────────────────────
            echo "📂 Deploy path: $DEPLOY_PATH"
            sudo mkdir -p "$DEPLOY_PATH"
            sudo chown -R "$USER":"$USER" "$DEPLOY_PATH"
            cd "$DEPLOY_PATH"

            # ── 4. Docker exige lowercase no nome da imagem ───────────────────
            REPO_OWNER_LOWER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')

            # ── 5. Preserva FRONT_VERSION do pipeline do frontend ─────────────
            FRONT_VER=$(grep -Po '(?<=^FRONT_VERSION=).*' .env 2>/dev/null || echo "latest")

            # ── 6. Escreve o .env completo (backend é dono deste arquivo) ─────
            cat > .env <<ENVEOF
            DB_NAME=${DB_NAME}
            DB_USER=${DB_USER}
            DB_PASSWORD=${DB_PASSWORD}
            RABBITMQ_USER=${RABBITMQ_USER}
            RABBITMQ_PASSWORD=${RABBITMQ_PASSWORD}
            JWT_SECRET=${JWT_SECRET}
            BACK_VERSION=latest
            FRONT_VERSION=${FRONT_VER}
            GHCR_OWNER=${REPO_OWNER_LOWER}
            ENVEOF

            # ── 7. Login no GHCR ──────────────────────────────────────────────
            echo "${GHCR_TOKEN}" | sudo docker login ghcr.io -u "${GHCR_ACTOR}" --password-stdin

            # ── 8. Pull da nova imagem do backend ─────────────────────────────
            sudo docker compose pull backend

            # ── 9. Sobe infra + backend (sem tocar em nginx/frontend) ─────────
            sudo docker compose up -d --no-deps postgres rabbitmq backend

            # ── 10. Aguarda serviços subirem ──────────────────────────────────
            echo "⏳ Aguardando backend iniciar..."
            sleep 10
            sudo docker compose ps

            # ── 11. Sanity check ──────────────────────────────────────────────
            RUNNING=$(sudo docker compose ps --status running 2>/dev/null | grep -c "backend" || true)
            if [ "$RUNNING" -lt 1 ]; then
              echo "❌ Backend falhou ao iniciar:"
              sudo docker compose logs backend --tail=30
              exit 1
            fi

            # ── 12. Remove imagens antigas ────────────────────────────────────
            sudo docker image prune -f

            echo "✅ Deploy backend concluído com sucesso"