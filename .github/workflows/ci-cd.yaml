# ─────────────────────────────────────────────────────────────────────────────
# CI/CD — EduSpace Backend
#
# Stages
# ──────
#  ci      — compile + test
#  docker  — build & push imagem para GHCR
#  prepare — prepara EC2: Docker, Compose, postgres, rabbitmq  (prepare-machine.yaml)
#  deploy  — pull da imagem do backend e sobe somente o container backend
#
# Secrets layout
# ──────────────
#  Organization secrets  (org → Settings → Secrets → Actions):
#    EC2_HOST          — IP / hostname da EC2
#    EC2_USER          — usuário SSH (ex: "ubuntu")
#    EC2_SSH_KEY       — conteúdo da chave PEM
#    EC2_DEPLOY_PATH   — caminho na EC2 (ex: /opt/eduspace)
#
#  Repository secrets  (repo → Settings → Secrets → Actions):
#    DB_NAME           — nome do banco PostgreSQL
#    DB_USER           — usuário do banco
#    DB_PASSWORD       — senha do banco
#    RABBITMQ_USER     — usuário RabbitMQ
#    RABBITMQ_PASSWORD — senha RabbitMQ
#    JWT_SECRET        — segredo JWT (≥256 bits hex)
# ─────────────────────────────────────────────────────────────────────────────

name: CI/CD — Backend

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY:   ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/study-back

jobs:

  # ── 1. Compile & test ────────────────────────────────────────────────────────
  ci:
    name: CI — compile & test
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Grant execute permission to mvnw
        run: chmod +x mvnw

      - name: Build & test
        run: ./mvnw -B verify --no-transfer-progress

  # ── 2. Build & push imagem Docker para GHCR ─────────────────────────────────
  docker:
    name: Docker — build & push
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags:   ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── 3. Preparação da máquina EC2 ────────────────────────────────────────────
  #
  # Chama o workflow reutilizável que instala Docker, Docker Compose e demais
  # dependências na EC2. Só executa no push da main.
  # ─────────────────────────────────────────────────────────────────────────────
  prepare:
    name: Prepare — máquina EC2
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: ./.github/workflows/prepare-machine.yaml
    secrets: inherit

  # ── 4. Deploy do backend na EC2 ─────────────────────────────────────────────
  #
  # Postgres e RabbitMQ já estão rodando (job prepare).
  # Este job faz apenas: pull da imagem + up do container backend.
  # NÃO toca em nginx nem frontend — gerenciados pelo pipeline do frontend.
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy — EC2
    runs-on: ubuntu-latest
    needs: [docker, prepare]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    permissions:
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Faz o deploy somente do backend ──────────────────────────────────────
      # (docker-compose.yaml, .env, postgres e rabbitmq já foram preparados
      #  pelo job prepare via prepare-machine.yaml)
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_PATH:  ${{ secrets.EC2_DEPLOY_PATH }}
          JWT_SECRET:   ${{ secrets.JWT_SECRET }}
          REPO_OWNER:   ${{ github.repository_owner }}
          GHCR_TOKEN:   ${{ secrets.GITHUB_TOKEN }}
          GHCR_ACTOR:   ${{ github.actor }}
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          port:     22
          timeout:  180s
          envs:     DEPLOY_PATH,JWT_SECRET,REPO_OWNER,GHCR_TOKEN,GHCR_ACTOR
          script: |
            set -euo pipefail
            cd "$DEPLOY_PATH"

            # ── 1. GHCR exige nome da imagem em lowercase ─────────────────────
            REPO_OWNER_LOWER=$(echo "$REPO_OWNER" | tr '[:upper:]' '[:lower:]')

            # ── 2. Atualiza BACK_VERSION, GHCR_OWNER e JWT_SECRET no .env ───────
            # (as demais variáveis já foram escritas pelo job prepare)
            sed -i "s|^BACK_VERSION=.*|BACK_VERSION=latest|" .env
            sed -i "s|^GHCR_OWNER=.*|GHCR_OWNER=${REPO_OWNER_LOWER}|" .env
            # JWT_SECRET: adiciona se não existir, atualiza se existir
            if grep -q "^JWT_SECRET=" .env; then
              sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${JWT_SECRET}|" .env
            else
              echo "JWT_SECRET=${JWT_SECRET}" >> .env
            fi

            # ── 3. Login no GHCR ──────────────────────────────────────────────
            echo "${GHCR_TOKEN}" | sudo docker login ghcr.io -u "${GHCR_ACTOR}" --password-stdin

            # ── 4. Pull + sobe somente o backend ──────────────────────────────
            sudo docker compose pull backend
            sudo docker compose up -d --no-deps backend

            # ── 5. Sanity check ───────────────────────────────────────────────
            sleep 15
            RUNNING=$(sudo docker compose ps --status running 2>/dev/null | grep -c "backend" || true)
            if [ "$RUNNING" -lt 1 ]; then
              echo "❌ Backend falhou ao iniciar:"
              sudo docker compose logs backend --tail=50
              exit 1
            fi

            # ── 6. Limpeza ────────────────────────────────────────────────────
            sudo docker image prune -f
            echo "✅ Deploy do backend concluído"
