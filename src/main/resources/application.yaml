server:
  servlet:
    context-path: /api/v1

spring:
  application:
    name: study-app

  datasource:
    url: jdbc:postgresql://localhost:5432/study
    username: study
    password: study123
    driver-class-name: org.postgresql.Driver

  data:
    redis:
      host: localhost
      port: 6379
      password: redis123


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: study

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: study
    default-schema: study

logging:
  level:
    root: INFO
    com.eduspace: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG

jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-256-bits-long!}
  access-token:
    expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
  refresh-token:
    expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:30}
