server:
  servlet:
    context-path: /api/v1
  # Forward headers from Nginx (X-Forwarded-Proto, etc.)
  forward-headers-strategy: framework

spring:
  application:
    name: study-app

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:study}
    username: ${DB_USER:study}
    password: ${DB_PASSWORD:study123}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000


  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    publisher-returns: true
    publisher-confirm-type: correlated
    connection-timeout: 5000
    template:
      retry:
        enabled: false
        max-attempts: 3
        initial-interval: 1000
        multiplier: 2
        max-interval: 10000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_schema: study
        show_sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: study
    default-schema: study

# ──────────────────────────────────────────────────────────
# JWT
# ──────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:dev-secret-key-must-be-at-least-256-bits-long!}
  access-token:
    expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:10080}
  refresh-token:
    expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:30}

# ──────────────────────────────────────────────────────────
# AMQP QUEUES
# ──────────────────────────────────────────────────────────
amqp:
  queue:
    user-created: user-created.queue
    notify-user: notify-user.queue
  dlq:
    user-created-dlq: user-created.dlq
    notify-user-dlq: notify-user.dlq

# ──────────────────────────────────────────────────────────
# ACTUATOR — health check used by Docker & Nginx
# ──────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
      base-path: /actuator
  endpoint:
    health:
      show-details: always
  health:
    rabbit:
      enabled: true
    db:
      enabled: true

# ──────────────────────────────────────────────────────────
# LOGGING
# ──────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate.SQL: DEBUG
    com.example.studycore: DEBUG
